<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coral Commission UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <div class="card">

      <div class="left">
        <div class="mockup">
          <img src="assets/WhatsApp Image 2026-03-03 at 16.23.24.jpeg" alt="Icon Preview">
        </div>
      </div>

      <div class="right">
        <h2>Commission Details</h2>

        <label>Client Name</label>
        <input type="text" placeholder="Lupy">

        <label>Item Type</label>
        <input type="text" placeholder="Custom Keychain">

        <label>Budget</label>
        <input type="text" placeholder="250K IDR">

        <label>Tanggal</label>
        <input type="date">

        <p class="total">Total Pembayaran: <span>250K</span></p>

        <button>Start Process</button>
      </div>

    </div>
  </div>
</body>
</html>
